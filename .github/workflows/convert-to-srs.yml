name: Convert Lists to SRS

on:
  push:
    paths:
      - 'loon/*.list'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install srsc
        run: |
          go install github.com/sagernet/srsc/cmd/srsc@latest
          echo "srsc installed at: $(which srsc || echo 'not found')"

      - name: Create output folder
        run: mkdir -p srs

      - name: Convert .list files to .srs and .json
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          
          if ! command -v srsc >/dev/null 2>&1; then
            echo "ERROR: srsc binary not found in PATH after install!"
            go env
            ls -la $(go env GOPATH)/bin
            exit 1
          fi
          
          srsc --version || echo "srsc version check failed (but may still work)"
          
          found=false
          for file in loon/*.list; do
            if [[ -f "$file" ]]; then
              found=true
              base=$(basename "$file" .list)
              echo "Processing $file → srs/$base.*"
              
              # Try modern/long flag style first
              srsc convert --input "$file" --output "srs/$base.srs" --format srs || {
                echo "Long flags failed, trying short flags fallback..."
                srsc convert -i "$file" -o "srs/$base.srs" -f srs
              }
              
              srsc convert --input "$file" --output "srs/$base.json" --format json || {
                srsc convert -i "$file" -o "srs/$base.json" -f json
              }
            fi
          done
          
          if [[ $found == false ]]; then
            echo "No .list files found in loon/ directory."
            exit 0
          fi

      - name: Commit generated SRS/JSON files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate .srs and .json from .list files"
          file_pattern: srs/*.*
